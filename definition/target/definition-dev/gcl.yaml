---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: Salesforce UserInfo Claims Enrichment DEV
    category: Custom
    metadata/interfaceScope: api,resource
    description: >-
      Enriches Authentication principal with per-user attributes from Salesforce
      UserInfo endpoint for ABAC authorization
    pdk.mulesoft.com/pdk-cli-version: 1.9.0
  name: salesforce-userinfo-claims-enrichment-dev-v1-0
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    userinfoService:
      type: string
      title: Salesforce UserInfo Service URL
      description: >-
        ⚠️ MUST include https:// protocol. Full URL to your Salesforce instance
        (e.g., https://login.salesforce.com or
        https://yourdomain.my.salesforce.com). The path is configured separately
        via userinfoPath.
    userinfoPath:
      type: string
      default: /services/oauth2/userinfo
      title: UserInfo Path
      description: >-
        Path of the Salesforce UserInfo endpoint. Change only if your org uses a
        custom domain or different path.
    propertiesKey:
      type: string
      default: custom_attributes
      title: Properties Key
      description: >-
        Nested key written under principal.properties that holds the entire
        custom_attributes pair-set relayed from UserInfo. ABAC reads
        principal.properties.<propertiesKey>.<attributeName>. Mirrors how JWT
        Validation nests claims under principal.properties.claims.
    attributeAllowList:
      type: array
      items:
        type: string
      title: Attribute Allow List
      description: >-
        When non-empty, only relay custom_attributes keys that appear in this
        list. Empty (default) relays all keys the Salesforce admin configured.
        Use to restrict which attributes downstream policies can read.
    timeoutMs:
      type: integer
      default: 5000
      minimum: 1000
      maximum: 30000
      title: UserInfo Request Timeout (ms)
      description: >-
        Maximum time in milliseconds to wait for the Salesforce UserInfo HTTP
        response before treating the call as a failure. Must be between 1000ms
        and 30000ms.
    cacheEnabled:
      type: boolean
      default: true
      title: Enable Caching
      description: >-
        Cache UserInfo attribute results keyed on a hash of the access token.
        Reduces outbound calls to Salesforce. Effective TTL is
        min(cacheTtlMinutes, remaining token lifetime).
    cacheTtlMinutes:
      type: integer
      default: 5
      minimum: 0
      maximum: 60
      title: Cache TTL (minutes)
      description: >-
        How long (in minutes) to cache a resolved attribute pair-set. Set 0 for
        no time-based expiry (cache only bounded by token lifetime). Maximum 60
        minutes. Only active when cacheEnabled is true.
    maxCacheEntries:
      type: integer
      default: 1000
      minimum: 1
      title: Max Cache Entries
      description: >-
        Maximum number of entries held in the cache at any time. Bounds memory
        usage. Mirrors the Token Introspection policy default of 1000.
    statusProperty:
      type: string
      default: mcp_enrichment_status
      title: Status Property Name
      description: >-
        A second key written to principal.properties.<statusProperty> carrying
        ok | error | unauthenticated. Allows ABAC rules to distinguish a
        successful enrichment from a failed one.
  required:
    - userinfoService
